<!DOCTYPE html>
<html>
    <head>
        <title>Local Storage Grades</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">


    </head> 

    <body>
        <h1 class="m-5">Create Character</h1>
        
        <form id="character-form">
            <input name="name" placeholder="Name">
            <input name="class" placeholder="Class">
            <input name="level" placeholder="1" type="number" min="1" max="20">
            <input name="score" placeholder="Score ex: 10.0">
            <button type="submit">Create</button>
        </form>

        <script src="../assets/js/main.js"></script>
        <script src="../assets/js/createCharacter.js"></script>
    </body>
</html>
